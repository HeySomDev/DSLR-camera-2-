<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>গ্লাস ক্যামেরা</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#000; color:white; height:100vh; overflow:hidden; touch-action:manipulation; }
        #video { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:1; }
        .glass { background:rgba(255,255,255,0.08); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.18); border-radius:9999px; box-shadow:0 8px 32px rgba(0,0,0,0.3); }
        .mode-selector { position:fixed; top:20px; right:20px; z-index:10; pointer-events:all; }
        .mode-pill { padding:7px 18px; font-size:14px; font-weight:600; cursor:pointer; }
        .mode-options { position:absolute; top:45px; right:0; background:rgba(20,20,20,0.96); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.15); border-radius:14px; width:170px; display:none; box-shadow:0 10px 30px rgba(0,0,0,0.5); padding:6px 0; }
        .mode-option, .sub-option, .reset-option { padding:10px 20px; cursor:pointer; }
        .mode-option:hover, .mode-option.active, .sub-option:hover { background:rgba(255,255,255,0.12); }
        .reset-option { color:#ff6b6b; border-top:1px solid rgba(255,255,255,0.1); margin-top:4px; }
        .controls { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:50px; z-index:10; pointer-events:all; }
        .capture-btn { width:82px; height:82px; border-radius:50%; background:rgba(255,255,255,0.95); border:6px solid #fff; box-shadow:0 0 0 10px rgba(255,255,255,0.25); transition:transform .2s; }
        .capture-btn:active { transform:scale(0.92); }
        .side-btn { width:58px; height:58px; border-radius:50%; background:rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; font-size:26px; backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.15); transition:all .3s; }
        .side-btn:active { background:rgba(255,255,255,0.25); transform:scale(0.95); }
        .flash { position:fixed; inset:0; background:white; opacity:0; z-index:100; transition:opacity .15s; }
        .preview { position:fixed; top:25px; left:25px; width:85px; height:120px; border-radius:18px; overflow:hidden; border:3px solid rgba(255,255,255,0.3); box-shadow:0 10px 30px rgba(0,0,0,0.5); display:none; z-index:20; }
        .timer { position:fixed; top:100px; left:50%; transform:translateX(-50%); font-size:72px; font-weight:700; text-shadow:0 4px 20px rgba(0,0,0,0.7); z-index:30; display:none; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    
    <div class="overlay">
        <div class="mode-selector glass">
            <div class="mode-pill" id="currentMode" onclick="toggleModeMenu()">HD</div>
            <div class="mode-options" id="modeOptions">
                <div class="mode-option active" onclick="setQualityMode(0)">HD</div>
                <div class="mode-option" onclick="setQualityMode(1)">Ultra HD</div>
                <div class="mode-option" onclick="setQualityMode(2)">DSLR</div>
                <div style="height:1px; background:rgba(255,255,255,0.1); margin:6px 12px;"></div>
                <div class="sub-option" onclick="toggleHDR(this)">HDR</div>
                <div class="sub-option" onclick="togglePortrait(this)">Portrait</div>
                <div class="reset-option" onclick="resetSettings()">সেটিংস রিসেট</div>
            </div>
        </div>

        <div id="preview" class="preview"><img id="thumb" src=""></div>
        <div id="timer" class="timer">3</div>

        <div class="controls">
            <div class="side-btn glass" onclick="switchCamera()">🔄</div>
            <div id="captureBtn" class="capture-btn" onclick="capturePhoto()"></div>
            <div class="side-btn glass" onclick="toggleGallery()">📸</div>
        </div>
    </div>

    <div id="flash" class="flash"></div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        let stream = null;
        let currentCamera = 'environment';
        let currentQuality = 0;
        let isHDR = false;
        let isPortrait = false;

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        const preview = document.getElementById('preview');
        const thumb = document.getElementById('thumb');
        const timerEl = document.getElementById('timer');
        const currentModeEl = document.getElementById('currentMode');
        const modeOptions = document.getElementById('modeOptions');

        async function startCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            let w = [1280, 1440, 1920][currentQuality];
            let h = [720, 1080, 1080][currentQuality];
            if (isPortrait) [w, h] = [h, w];

            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentCamera, width: {ideal: w}, height: {ideal: h} }
            });
            video.srcObject = stream;
            await video.play();
        }

        function switchCamera() {
            currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
            startCamera();
        }

        function toggleModeMenu() {
            modeOptions.style.display = modeOptions.style.display === 'block' ? 'none' : 'block';
        }

        function setQualityMode(mode) {
            currentQuality = mode;
            currentModeEl.textContent = ['HD', 'Ultra HD', 'DSLR'][mode];
            startCamera();
        }

        function toggleHDR(el) {
            isHDR = !isHDR;
            el.style.color = isHDR ? '#4ade80' : '';
        }

        function togglePortrait(el) {
            isPortrait = !isPortrait;
            el.style.color = isPortrait ? '#4ade80' : '';
            startCamera();
        }

        /** প্রফেশনাল ইমেজ প্রসেসিং ইঞ্জিন (V2.0) */
        function processCapture() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imageData.data;

            const modes = {
                0: { sat: 1.15, cont: 1.05, temp: 0 },
                1: { sat: 1.30, cont: 1.15, temp: 5 },
                2: { sat: 1.50, cont: 1.35, temp: 15 }
            };
            
            let config = modes[currentQuality];

            for (let i = 0; i < data.length; i += 4) {
                for (let j = 0; j < 3; j++) {
                    let val = data[i + j] / 255;
                    val = (val - 0.5) * config.cont + 0.5;
                    val = (val - 0.5) * config.sat + 0.5;
                    data[i + j] = Math.min(255, Math.max(0, val * 255));
                }
                data[i] += config.temp;
            }

            ctx.putImageData(imageData, 0, 0);

            if (currentQuality === 2) {
                const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width*0.2, canvas.width/2, canvas.height/2, canvas.width*0.8);
                grad.addColorStop(0, 'transparent');
                grad.addColorStop(1, 'rgba(0,0,0,0.6)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        // ========== সংশোধিত capturePhoto ফাংশন ==========
        async function capturePhoto() {
            if (!stream) return;
            
            flash.style.opacity = '0.7'; 
            setTimeout(() => flash.style.opacity = '0', 150);

            timerEl.style.display = 'block';
            for(let i=3; i>=1; i--){ 
                timerEl.textContent = i; 
                await new Promise(r => setTimeout(r, 400)); 
            }
            timerEl.style.display = 'none';

            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            processCapture();

            const dataUrl = canvas.toDataURL('image/jpeg', 1.0);
            thumb.src = dataUrl; 
            preview.style.display = 'block';

            const a = document.createElement('a');
            const modeName = ['HD', 'UltraHD', 'DSLR'][currentQuality];
            a.download = `GlassCam_\( {modeName}_ \){Date.now()}.jpg`;
            a.href = dataUrl; 
            a.click();
        }

        function resetSettings() {
            currentQuality = 0; isHDR = false; isPortrait = false;
            currentModeEl.textContent = 'HD';
            document.querySelectorAll('.sub-option').forEach(o => o.style.color = '');
            modeOptions.style.display = 'none';
            startCamera();
        }

        function toggleGallery() {
            alert("গ্যালারি খুলছে...\nছবিগুলো ডাউনলোড হয়েছে");
        }

        window.onload = () => {
            startCamera();
            document.addEventListener('contextmenu', e => e.preventDefault());
        };
    </script>
</body>
</html>
